app-id: dev.silkepilon.Orchestrator
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: orchestrator

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --filesystem=xdg-config/kube:ro
  - --filesystem=~/.kube:ro
  - --filesystem=~/.ssh:ro
  - --filesystem=xdg-config/orchestrator:create

cleanup:
  - /include
  - /lib/sdk
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /man
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: golang
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/sdk/golang
      - cp -a . /app/lib/sdk/golang
    sources:
      - type: archive
        url: https://go.dev/dl/go1.26.2.linux-amd64.tar.gz
        sha256: 990e6b4bbba816dc3ee129eaeaf4b42f17c2800b88a2166c265ac1a200262282
        strip-components: 1
        only-arches:
          - x86_64
      - type: archive
        url: https://go.dev/dl/go1.26.2.linux-arm64.tar.gz
        sha256: c958a1fe1b361391db163a485e21f5f228142d6f8b584f6bef89b26f66dc5b23
        strip-components: 1
        only-arches:
          - aarch64

  - name: vte
    buildsystem: meson
    config-opts:
      - -Dgtk3=false
      - -Dgtk4=true
      - -Dvapi=false
      - -Ddocs=false
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/applications/org.gnome.Vte.App.Gtk4.desktop
      - /share/gir-1.0
      - /share/vala
      - /share/xdg-terminals
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.82/vte-0.82.3.tar.xz
        sha256: 6dc6278f6fee30d07d1a03e2ba3335b1ea4e8d2956ceb59d861943115d930a85

  - name: orchestrator
    buildsystem: simple
    build-options:
      append-path: /app/lib/sdk/golang/bin
      env:
        GOROOT: /app/lib/sdk/golang
        GOPATH: /run/build/orchestrator/go
        GOMODCACHE: /run/build/orchestrator/go/pkg/mod
        GOPROXY: file:///run/build/orchestrator/go/pkg/mod/cache/download
        GOSUMDB: 'off'
        CGO_ENABLED: '1'
    build-commands:
      - glib-compile-resources --sourcedir=internal/icon --target=internal/icon/icon.gresource internal/icon/gresource.xml
      - go build -trimpath -mod=mod -ldflags='-s -w -X main.version=0.1.0' -o orchestrator .
      - install -Dm755 orchestrator /app/bin/orchestrator
      - install -Dm644 dev.silkepilon.Orchestrator.desktop /app/share/applications/dev.silkepilon.Orchestrator.desktop
      - install -Dm644 dev.silkepilon.Orchestrator.metainfo.xml /app/share/metainfo/dev.silkepilon.Orchestrator.metainfo.xml
      - install -Dm644 internal/icon/orchestrator.svg /app/share/icons/hicolor/scalable/apps/dev.silkepilon.Orchestrator.svg
      - install -Dm644 LICENSE /app/share/licenses/dev.silkepilon.Orchestrator/LICENSE
    sources:
      - type: git
        url: https://github.com/SilkePilon/Orchestrator.git
        tag: 0.1.0
        x-checker-data:
          type: git
          tag-pattern: ^([0-9.]+)$
      - flatpak-go-sources.json
